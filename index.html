let currentTab = 'all';

function renderReports(filterText) {
  const grid = document.getElementById('reports-grid');
  const noResults = document.getElementById('no-results');
  let visible = 0;
  
  grid.innerHTML = reports.map(r => {
    const searchStr = (r.num + ' ' + r.title + ' ' + r.file).toLowerCase();
    if (filterText && !searchStr.includes(filterText.toLowerCase())) return '';
    visible++;
    return `<a class="card" href="./reports/${r.file}" target="_blank">
      <div class="num">${r.num ? '#'+r.num : 'N/A'}</div>
      <div class="title">${r.title}</div>
      <div class="path">报告 #${r.num} · 点击访问</div>
    </a>`;
  }).join('');
  
  document.getElementById('reports-visible-count').textContent = visible;
  noResults.style.display = (visible === 0 && filterText) ? 'block' : 'none';
}

function renderProjects(filterText) {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = projects.map(p => {
    if (filterText && !p.name.toLowerCase().includes(filterText.toLowerCase()) && !p.desc.toLowerCase().includes(filterText.toLowerCase())) return '';
    return `<a class="project-card" href="${p.url}" target="_blank">
      <div class="name">${p.name}</div>
      <div class="type">🎨 Web Demo</div>
      <div class="desc">${p.desc}</div>
    </a>`;
  }).join('');
}

function filterAll() {
  const text = document.getElementById('search').value;
  renderReports(text);
  renderProjects(text);
}

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  
  const reportsSection = document.getElementById('reports-section');
  const demosSection = document.getElementById('demos-section');
  const text = document.getElementById('search').value;
  
  if (tab === 'all') {
    reportsSection.style.display = '';
    demosSection.style.display = '';
  } else if (tab === 'reports') {
    reportsSection.style.display = '';
    demosSection.style.display = 'none';
  } else {
    reportsSection.style.display = 'none';
    demosSection.style.display = '';
  }
}
